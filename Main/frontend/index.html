<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifePilot - Weekly Goals & Tasks</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar expanded" id="sidebar">
            <div class="logo">
                <button id="btn-toggle-sidebar" class="logo-btn" title="Toggle Sidebar">
                    <!-- <img src="assets/img/logo.svg" alt="LifePilot" class="sidebar-logo-img"
                        style="height: 24px; width: auto; object-fit: contain;"> -->
                    <h1>LifePilot</h1>
                </button>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="weekly">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="nav-text">Weekly Planner</span>
                </button>

                <!-- Mini Calendar -->
                <div class="mini-calendar" id="mini-calendar">
                    <div class="calendar-header">
                        <span id="calendar-month-year" class="month-title">June 2026</span>
                        <div class="calendar-nav">
                            <button id="cal-prev" title="Previous Month">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <button id="cal-next" title="Next Month">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="calendar-grid-header">
                        <div class="cal-day-name">Mon</div>
                        <div class="cal-day-name">Tue</div>
                        <div class="cal-day-name">Wed</div>
                        <div class="cal-day-name">Thu</div>
                        <div class="cal-day-name">Fri</div>
                        <div class="cal-day-name">Sat</div>
                        <div class="cal-day-name">Sun</div>
                    </div>
                    <div class="calendar-grid" id="calendar-dates">
                        <!-- Dates injected via JS -->
                    </div>
                </div>
            </nav>
            <div class="sidebar-actions">
                <button id="btn-prev-week" class="btn-secondary nav-text">← Prev Week</button>
                <button id="btn-next-week" class="btn-secondary nav-text">Next Week →</button>
                <button id="btn-current-week" class="btn-primary nav-text"
                    style="margin-top: 10px; width: 100%;">Current Week</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2 id="week-title">Week Goals & Tasks</h2>
                <div class="user-profile" style="display: flex; align-items: center; gap: 12px;">
                    <button id="theme-toggle" title="Toggle Light/Dark Theme" style="background: transparent; border: none; cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--text-primary); transition: background 0.2s;">
                        <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <span id="topbar-user-name"
                        style="font-weight: 600; font-size: 1rem; color: var(--text-primary);"></span>
                    <div class="avatar"></div>
                </div>
            </header>

            <div id="view-weekly" class="view-section active">

                <!-- Weekly Overview Section -->
                <div class="weekly-overview-grid" style="grid-template-columns: 1fr 1.5fr 1.5fr;">

                    <!-- Week Summary & Donut Chart -->
                    <div class="glass-panel summary-panel">
                        <div class="summary-info">
                            <h3 id="week-label">Week 24</h3>
                            <div class="stats-table">
                                <div><span>Completed</span><strong id="stat-comp">0</strong></div>
                                <div><span>In Progress</span><strong id="stat-prog">0</strong></div>
                                <div><span>Total</span><strong id="stat-tot">0</strong></div>
                            </div>
                        </div>
                        <div class="donut-container">
                            <canvas id="weeklyDonutChart"></canvas>
                            <div class="donut-text" id="weekly-percent">0%</div>
                        </div>
                    </div>

                    <!-- Weekly Goals -->
                    <div class="glass-panel goals-panel">
                        <h3>Weekly Goals</h3>
                        <div class="goals-list">
                            <div class="main-group"
                                style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                                <div id="goals-main-list"></div>
                                <input type="text" id="add-goal-main" placeholder="+ Add Goal..." class="add-input">
                            </div>
                        </div>
                    </div>

                    <!-- Weekly Reflection -->
                    <div class="glass-panel reflection-panel">
                        <h3>Weekly Reflection</h3>
                        <div class="reflection-inputs">
                            <textarea id="ref-q1"
                                placeholder="Điều gì tôi đã làm tốt và muốn tiếp tục phát huy?"></textarea>
                            <textarea id="ref-q2"
                                placeholder="Bài học quan trọng nhất tôi rút ra được là gì?"></textarea>
                            <textarea id="ref-q3" placeholder="Tôi biết ơn về việc..."></textarea>
                            <textarea id="ref-q4"
                                placeholder="Ba mục tiêu tôi cần tập trung trong tuần tiếp theo là?"></textarea>
                        </div>
                    </div>

                </div>

                <!-- Daily View Section -->
                <div class="daily-grid" id="daily-grid">
                    <!-- Days will be generated via JS -->
                </div>

            </div>

            <!-- Daily View Section -->
            <div id="view-daily" class="view-section">
                <div class="daily-header-bar" style="display: flex; align-items: center; margin-bottom: 1.5rem;">
                    <button id="btn-back-weekly" class="btn-secondary">← Back to Weekly</button>
                    <h2 id="daily-view-title" style="margin-left: 1rem; color: var(--accent-primary);">Monday 06/07</h2>
                </div>

                <div class="daily-view-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;">
                    <!-- Daily Chart -->
                    <div class="glass-panel daily-stats-panel summary-panel">
                        <div class="summary-info">
                            <h3>Daily Progress</h3>
                            <div class="stats-table">
                                <div><span>Completed</span><strong id="daily-stat-comp">0</strong></div>
                                <div><span>Total</span><strong id="daily-stat-tot">0</strong></div>
                            </div>
                        </div>
                        <div class="donut-container">
                            <canvas id="dailyDonutChart"></canvas>
                            <div class="donut-text" id="daily-percent">0%</div>
                        </div>
                    </div>

                    <!-- Main Goal & Reflection -->
                    <div class="glass-panel daily-reflection-panel">
                        <div class="daily-boxes-container"
                            style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: 100%;">
                            <div class="day-box" style="height: 100%;">
                                <div class="day-box-label">Mục tiêu chính trong ngày</div>
                                <textarea id="daily-q1" placeholder="Mục tiêu quan trọng nhất hôm nay là gì?"
                                    style="height: 100%;"></textarea>
                            </div>
                            <div class="day-box" style="height: 100%;">
                                <div class="day-box-label">Reflection & Note</div>
                                <textarea id="daily-reflection" placeholder="Ngày hôm nay của bạn thế nào?"
                                    style="height: 100%;"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Detailed Tasks -->
                <div class="glass-panel detailed-tasks-panel" style="margin-top: 1.5rem;">
                    <h3 style="color: var(--accent-primary); margin-bottom: 1rem;">Detailed Tasks</h3>
                    <div class="detailed-task-list" id="detailed-task-list"
                        style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                        <!-- Tasks injected via JS -->
                    </div>
                    <div class="add-task-form" style="display: flex; gap: 0.5rem;">
                        <input type="time" id="add-task-time" class="add-input" value="06:00" onclick="this.showPicker()" style="width: 120px; margin-top: 0; cursor: pointer;">
                        <input type="text" id="add-task-text" placeholder="+ Add Detailed Task..." class="add-input"
                            style="flex: 1; margin-top: 0;">
                        <button id="btn-add-task" class="btn-primary" style="padding: 0.4rem 1rem;">Add</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
